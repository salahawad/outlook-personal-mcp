# Publish to PyPI on GitHub release using OIDC Trusted Publishing (no API token needed).
#
# One-time setup required on PyPI before this workflow will succeed:
#   Project → Publishing → Add a trusted publisher
#   GitHub owner:     salahawad
#   Repository name:  outlook-personal-mcp
#   Workflow filename: publish.yml
#   Environment name: pypi
#
# See PUBLISHING.md for the full runbook.

name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-outlook-personal
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
